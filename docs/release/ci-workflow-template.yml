name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Compile Python files
        run: uv run --python ${{ matrix.python-version }} --project . python -m compileall src/semantic_guard tests

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --project . python -m unittest discover -s tests -v

      - name: Evaluate fixtures
        run: uv run --python ${{ matrix.python-version }} --project . semantic-guard evaluate-fixtures

      - name: Run doctor
        run: uv run --python ${{ matrix.python-version }} --project . semantic-guard doctor
