name: Fixture or rule gap
description: Propose a calibration example, false positive, false negative, or detector gap.
title: "[calibration]: "
labels: ["calibration"]
body:
  - type: dropdown
    id: gap_kind
    attributes:
      label: Gap kind
      options:
        - good warning to preserve
        - noisy warning or likely false positive
        - missed warning or likely false negative
        - rule wording or documentation issue
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Provide the smallest redacted input that shows the gap.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected_review
    attributes:
      label: Expected review
      description: What should the tool warn about, suppress, or classify differently?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Engineering obligation
      description: Tie the example to public contract, rollback, evidence, identity, failure handling, operations, concurrency, retention, destructive operation, time-dependent source, or human decision boundary.
    validations:
      required: false
